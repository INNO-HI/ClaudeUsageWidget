name: Bug report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please check the [Troubleshooting section](../README.md#troubleshooting) first — most install issues are answered there.

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → About, or right-click `Claude Usage Widget.app` → Info
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "14.4.1 (Sonoma)"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Mac architecture
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the widget
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Open `Console.app`, filter by `ClaudeUsageWidget`, paste relevant lines here.
      render: text
