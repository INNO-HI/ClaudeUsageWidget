name: Feature request
description: Propose a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not just the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other tools have you tried?
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / examples (optional)
      description: Screenshots from other apps, sketches, or links.
    validations:
      required: false
