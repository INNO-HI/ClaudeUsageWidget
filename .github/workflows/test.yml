# Run unit tests on every push and pull request.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  swift-test:
    runs-on: macos-14
    timeout-minutes: 10
    defaults:
      run:
        working-directory: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Run XCTest
        run: swift test --parallel
